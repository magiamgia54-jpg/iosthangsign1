<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Đăng ký</title>

<style>

body{
font-family:-apple-system;
background:#f2f2f7;
margin:0;
}

header{
background:white;
padding:16px;
text-align:center;
font-size:20px;
}

.container{
padding:25px;
max-width:400px;
margin:auto;
}

.box{
background:white;
padding:25px;
border-radius:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
margin-top:15px;
width:100%;
padding:10px;
border:none;
background:#007aff;
color:white;
border-radius:10px;
}

</style>

</head>

<body>

<header>Đăng ký</header>

<div class="container">

<div class="box">

<input placeholder="Tài khoản">

<input type="password" placeholder="Mật khẩu">

<button>Đăng ký</button>

</div>

</div>

</body>
</html>
