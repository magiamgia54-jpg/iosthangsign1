<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f2f2f7;
padding:20px;
}

h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#007aff;
color:white;
border:none;
padding:12px;
border-radius:10px;
width:100%;
cursor:pointer;
}

.app{
background:white;
padding:15px;
border-radius:15px;
margin-top:15px;
}

</style>

</head>

<body>

<h2>⚙️ Admin Thêm App</h2>

<input id="name" placeholder="Tên App">

<input id="desc" placeholder="Mô tả">

<input id="icon" placeholder="Link icon">

<input id="ipa" placeholder="Link IPA">

<button onclick="addApp()">Thêm App</button>

<script>

function addApp(){

let name=document.getElementById("name").value
let desc=document.getElementById("desc").value
let icon=document.getElementById("icon").value
let ipa=document.getElementById("ipa").value

let plist="itms-services://?action=download-manifest&url="+ipa.replace(".ipa",".plist")

let apps=JSON.parse(localStorage.getItem("apps"))||[]

apps.push({

name:name,
desc:desc,
icon:icon,
link:plist

})

localStorage.setItem("apps",JSON.stringify(apps))

alert("Đã thêm app")

}

</script>

</body>
</html>
