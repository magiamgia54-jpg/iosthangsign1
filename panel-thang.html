<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f2f2f7;
padding:20px;
}

h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#007aff;
color:white;
border:none;
padding:12px;
border-radius:10px;
width:100%;
cursor:pointer;
}

.app{
background:white;
padding:15px;
border-radius:15px;
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete{
background:red;
padding:8px 12px;
border-radius:8px;
color:white;
border:none;
}

</style>

</head>

<body>

<h2>⚙️ Admin Thêm App</h2>

<input id="name" placeholder="Tên App">
<input id="desc" placeholder="Mô tả">
<input id="icon" placeholder="Link Icon">
<input id="link" placeholder="Link Install / IPA">

<button onclick="addApp()">Thêm App</button>

<h2>📦 Danh sách App</h2>

<div id="appList"></div>

<script>

function loadApps(){

let apps=JSON.parse(localStorage.getItem("apps"))||[]

let list=document.getElementById("appList")

list.innerHTML=""

apps.forEach((app,index)=>{

list.innerHTML+=`

<div class="app">

<div>
<b>${app.name}</b><br>
<small>${app.desc}</small>
</div>

<button class="delete" onclick="deleteApp(${index})">Xóa</button>

</div>

`

})

}

function addApp(){

let name=document.getElementById("name").value
let desc=document.getElementById("desc").value
let icon=document.getElementById("icon").value
let link=document.getElementById("link").value

let apps=JSON.parse(localStorage.getItem("apps"))||[]

apps.push({name,desc,icon,link})

localStorage.setItem("apps",JSON.stringify(apps))

alert("Đã thêm app")

loadApps()

}

function deleteApp(i){

let apps=JSON.parse(localStorage.getItem("apps"))||[]

apps.splice(i,1)

localStorage.setItem("apps",JSON.stringify(apps))

loadApps()

}

loadApps()

</script>

</body>
</html>
