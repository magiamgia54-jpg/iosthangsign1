<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>iOS Apps</title>

<style>

body{
font-family:Arial;
background:#f2f2f7;
padding:20px;
}

.title{
font-size:28px;
text-align:center;
margin-bottom:30px;
}

.app{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:15px;
display:flex;
align-items:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.app img{
width:65px;
height:65px;
border-radius:15px;
margin-right:15px;
}

.app-info{
flex:1;
}

.app-info h3{
margin:0;
font-size:18px;
}

.app-info p{
margin:3px 0;
color:gray;
font-size:14px;
}

.install button{
background:#007aff;
color:white;
border:none;
padding:8px 18px;
border-radius:12px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="title">Ứng dụng iOS</div>

<div class="app">

<img src="youtube.png">

<div class="app-info">
<h3>YouTube uYouPlus</h3>
<p>YouTube không quảng cáo</p>
</div>

<div class="install">
<a href="itms-services://?action=download-manifest&url=https://iossign.xo.je/uyou.plist">
<button>GET</button>
</a>
</div>

</div>


<div class="app">

<img src="spotify.png">

<div class="app-info">
<h3>Spotify++</h3>
<p>Spotify Premium</p>
</div>

<div class="install">
<a href="itms-services://?action=download-manifest&url=https://iossign.xo.je/spotify.plist">
<button>GET</button>
</a>
</div>

</div>


<div class="app">

<img src="delta.png">

<div class="app-info">
<h3>Delta Emulator</h3>
<p>Giả lập game Nintendo</p>
</div>

<div class="install">
<a href="itms-services://?action=download-manifest&url=https://iossign.xo.je/delta.plist">
<button>GET</button>
</a>
</div>

</div>

</body>
</html>
