/* TEXT TYPING */

/* APP LIST */

.app img{

.install{

color:white;
padding:10px 15px;

}

/* TUYẾT */

.snowflake{
position:fixed;
top:-10px;
color:white;
font-size:12px;
pointer-events:none;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

.footer{

}

<script>

/* MENU */

function toggleMenu(){

let menu=document.getElementById("menu")

menu.style.display =
menu.style.display==="block" ? "none":"block"

}

/* INSTALL */

function installApp(plist){

window.location=
"itms-services://?action=download-manifest&url="+plist

}

/* TEXT */

const texts=[

"Mua Chứng Chỉ Esign Liên Hệ Zalo",
"Mua Chứng Chỉ Ksign Liên Hệ Telegram",
"Website Ký App IOS Uy Tín"

]

let index=0
let char=0
let deleting=false

function type(){

let el=document.getElementById("typing")

if(!deleting){

el.innerHTML=texts[index].substring(0,char++)

if(char>texts[index].length){

deleting=true
setTimeout(type,1500)
return

}

}else{

el.innerHTML=texts[index].substring(0,char--)

if(char<0){

deleting=false
index++

if(index>=texts.length)
index=0

}

}

setTimeout(type,80)

}

type()

/* TUYẾT */

function snow(){

let snow=document.createElement("div")

snow.className="snowflake"
snow.innerHTML="❄"

snow.style.left=Math.random()*window.innerWidth+"px"
snow.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(snow)

setTimeout(()=>{

snow.remove()

},10000)

}

setInterval(snow,200)

</script>
