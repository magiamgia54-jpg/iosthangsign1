<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<style>
body{
font-family:Arial;
background:#f2f2f7;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:30px;
border-radius:20px;
max-width:350px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#007aff;
color:white;
border:none;
padding:12px;
width:95%;
border-radius:10px;
}
</style>

</head>

<body>

<div class="box">

<h2>Đăng nhập</h2>

<input id="user" placeholder="Tên tài khoản">
<input id="pass" type="password" placeholder="Mật khẩu">

<button onclick="login()">Đăng nhập</button>

</div>

<script>

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(user==localStorage.getItem("user") && pass==localStorage.getItem("pass")){

alert("Đăng nhập thành công");
window.location="nap.html";

}else{

alert("Sai tài khoản");

}

}

</script>

</body>
</html>
