<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Admin cộng xu</title>
</head>

<body style="font-family:Arial;text-align:center;padding:40px">

<h2>Admin cộng xu</h2>

<input id="uid" placeholder="UID user"><br><br>

<input id="xu" placeholder="Số xu"><br><br>

<button onclick="cong()">Cộng Xu</button>

<script type="module" src="firebase.js"></script>

<script type="module">

import { doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.cong = async function(){

let uid=document.getElementById("uid").value;
let xu=parseInt(document.getElementById("xu").value);

let ref=doc(db,"users",uid);

await updateDoc(ref,{
xu:xu
});

alert("Cộng xu thành công");

}

</script>

</body>
</html>
