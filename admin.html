<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Admin Thêm App</title>

<style>

body{
font-family:Arial;
background:#f2f2f7;
padding:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#007aff;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:8px;
}

</style>

</head>

<body>

<h2>Thêm App</h2>

<input id="name" placeholder="Tên app">

<input id="desc" placeholder="Mô tả">

<input id="icon" placeholder="Link icon">

<input id="plist" placeholder="Link plist">

<button onclick="addApp()">Thêm App</button>

<script>

function addApp(){

let name=document.getElementById("name").value
let desc=document.getElementById("desc").value
let icon=document.getElementById("icon").value
let plist=document.getElementById("plist").value

let newApp={
name:name,
desc:desc,
icon:icon,
link:"itms-services://?action=download-manifest&url="+plist
}

let apps=JSON.parse(localStorage.getItem("apps"))||[]

apps.push(newApp)

localStorage.setItem("apps",JSON.stringify(apps))

alert("Đã thêm app")

}

</script>

</body>
</html>
