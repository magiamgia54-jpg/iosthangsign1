<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f2f2f7;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:400px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#007aff;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
cursor:pointer;
}

h2{
text-align:center;
}

</style>

</head>

<body>

<div id="login" class="box">

<h2>Admin Login</h2>

<input id="pass" placeholder="Nhập mật khẩu">

<button onclick="login()">Đăng nhập</button>

</div>

<div id="panel" class="box" style="display:none">

<h2>Thêm App</h2>

<input id="name" placeholder="Tên app">

<input id="desc" placeholder="Mô tả">

<input id="icon" placeholder="Link icon">

<input id="plist" placeholder="Link plist">

<button onclick="addApp()">Thêm App</button>

</div>

<script>

function login(){

let pass=document.getElementById("pass").value

if(pass=="123456"){

document.getElementById("login").style.display="none"
document.getElementById("panel").style.display="block"

}else{

alert("Sai mật khẩu")

}

}

function addApp(){

let name=document.getElementById("name").value
let desc=document.getElementById("desc").value
let icon=document.getElementById("icon").value
let plist=document.getElementById("plist").value

let apps=JSON.parse(localStorage.getItem("apps"))||[]

apps.push({
name:name,
desc:desc,
icon:icon,
plist:plist
})

localStorage.setItem("apps",JSON.stringify(apps))

alert("Đã thêm app")

}

</script>

</body>
</html>
