<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Admin quản lý user</title>

<style>

body{
font-family:Arial;
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

button{
padding:6px 10px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Danh sách người dùng</h2>

<table>

<tr>
<th>Email</th>
<th>Xu</th>
<th>Cộng Xu</th>
</tr>

<tbody id="users"></tbody>

</table>

<script type="module" src="firebase.js"></script>

<script type="module">

import { collection,getDocs,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function loadUsers(){

let snap = await getDocs(collection(db,"users"));

let html="";

snap.forEach((d)=>{

let data=d.data();

html+=`
<tr>

<td>${data.email}</td>

<td id="xu_${d.id}">${data.xu}</td>

<td>

<input id="add_${d.id}" placeholder="Xu" style="width:60px">

<button onclick="cong('${d.id}')">Cộng</button>

</td>

</tr>
`;

});

document.getElementById("users").innerHTML=html;

}

window.cong = async function(uid){

let val=document.getElementById("add_"+uid).value;

let ref=doc(db,"users",uid);

await updateDoc(ref,{
xu:parseInt(val)
});

document.getElementById("xu_"+uid).innerHTML=val;

alert("Cộng xu thành công");

}

loadUsers();

</script>

</body>
</html>
