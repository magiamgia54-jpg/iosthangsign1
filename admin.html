<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin cộng xu</title>

<style>
body{font-family:Arial;background:#f2f2f7;text-align:center;padding:40px;}
.box{background:white;padding:30px;border-radius:20px;max-width:350px;margin:auto;}
input{width:90%;padding:12px;margin:10px;border-radius:10px;border:1px solid #ddd;}
button{background:#28a745;color:white;border:none;padding:12px;width:95%;border-radius:10px;}
</style>

</head>

<body>

<div class="box">

<h2>Admin cộng xu</h2>

<input id="user" placeholder="Tên tài khoản">

<input id="xu" placeholder="Số xu cộng">

<button onclick="cong()">Cộng Xu</button>

</div>

<script>

function cong(){

let user=document.getElementById("user").value;

let them=parseInt(document.getElementById("xu").value);

let users=JSON.parse(localStorage.getItem("users")) || {};

if(!users[user]){

alert("User không tồn tại");

return;

}

users[user].xu += them;

localStorage.setItem("users",JSON.stringify(users));

alert("Cộng xu thành công");

}

</script>

</body>
</html>
