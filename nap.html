<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ví Xu</title>

<style>
body{
font-family:Arial;
background:#f2f2f7;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:30px;
border-radius:20px;
max-width:350px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

button{
background:#28a745;
color:white;
border:none;
padding:12px;
width:90%;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Ví của bạn</h2>

<p>Số xu hiện tại:</p>

<h1 id="xu"></h1>

<button onclick="nap()">Admin cộng 100 xu</button>

</div>

<script>

function load(){

document.getElementById("xu").innerHTML =
localStorage.getItem("xu");

}

function nap(){

let xu=parseInt(localStorage.getItem("xu"));

xu +=100;

localStorage.setItem("xu",xu);

load();

}

load();

</script>

</body>
</html>
