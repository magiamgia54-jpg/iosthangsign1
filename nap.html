<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ví Xu</title>

<style>
body{font-family:Arial;background:#f2f2f7;text-align:center;padding:40px;}
.box{background:white;padding:30px;border-radius:20px;max-width:350px;margin:auto;}
</style>

</head>

<body>

<div class="box">

<h2>Ví của bạn</h2>

<p>User:</p>

<h3 id="user"></h3>

<p>Số xu hiện tại:</p>

<h1 id="xu"></h1>

</div>

<script>

let user=localStorage.getItem("currentUser");

let users=JSON.parse(localStorage.getItem("users"));

document.getElementById("user").innerHTML=user;

document.getElementById("xu").innerHTML=users[user].xu;

</script>

</body>
</html>
