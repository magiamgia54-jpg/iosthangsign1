<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thanh Toán</title>

<style>

body{
font-family:Arial;
background:#f5f6f8;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
max-width:420px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.price{
background:#f1f1f1;
padding:15px;
border-radius:10px;
margin-bottom:20px;
text-align:left;
}

.stk{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.qr{
width:250px;
margin:20px 0;
}

.token{
background:#fff3cd;
padding:12px;
border-radius:10px;
margin-top:15px;
font-weight:bold;
}

.btn{
display:block;
margin-top:20px;
padding:14px;
background:#0084ff;
color:white;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<div class="title">Quét QR để thanh toán</div>

<div class="price">

<b>Bảng giá</b><br><br>

Basic ký app: <b>10.000đ / lần</b><br>
VIP: <b>50.000đ / tháng</b><br>
Cực VIP: <b>100.000đ / tháng</b>

</div>

<div>
<b>LY VAN THANG</b>
</div>

<div class="stk">
23935211
</div>

<div>
Ngân hàng ACB
</div>

<img class="qr"
src="https://img.vietqr.io/image/acb-23935211-compact.png?addInfo=Thangdepzai">

<div class="token" id="token">
</div>

<a class="btn" id="zaloBtn" href="#">
Tôi đã chuyển tiền
</a>

</div>

<script>

let token = "THANG-" + Math.floor(100000 + Math.random()*900000);

document.getElementById("token").innerHTML =
"Mã xác nhận của bạn: " + token;

document.getElementById("zaloBtn").href =
"https://zalo.me/0395251479?text=Em đã chuyển tiền. Mã xác nhận: " + token;

</script>

</body>
</html>
